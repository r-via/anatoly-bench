# Anatoly configuration — generated by first-run wizard. Edit freely.
# Optional sections are commented out below — uncomment what you need.

version: 3

# ---- project ---------------------------------------------------------------
project:
  name: task-vault

# ---- scan ------------------------------------------------------------------
# Detected from your manifests (package.json, tsconfig.json, Cargo.toml, …)
# and language distribution. Edit freely — these are the strict, authoritative
# globs `collectFiles` consumes.
#
# respect_gitignore (default true): files ignored by .gitignore are filtered
# out by intersecting with `git ls-files`. Set to false to audit gitignored
# files explicitly.
scan:
  include:
    - src/**/*.{ts,tsx}
  exclude:
    - .anatoly/**
    - .git/**
    - .next/**
    - build/**
    - coverage/**
    - dist/**
    - node_modules/**
  respect_gitignore: true

# ---- providers -------------------------------------------------------------
providers:
  anthropic:
    transport: claude_agent_sdk
    auth: oauth
    concurrency: 24
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - claude-opus-4-6
  local-advanced:
    transport: openai_compatible
    auth: none
    models:
      - nomic-embed-code-gguf
      - qwen3-embedding-8b-gguf

# ---- routing ---------------------------------------------------------------
# summarization (Haiku) is load-bearing for THIS fixture: the rag-index NLP
# summariser assigns each function its `behavioralProfile`, which the
# deterministic `flows` phase reads to pick entry candidates and effect leaves.
routing:
  generation:
    quality: anthropic/claude-sonnet-4-6
    fast: anthropic/claude-haiku-4-5-20251001
    deliberation: anthropic/claude-opus-4-6
    summarization: anthropic/claude-haiku-4-5-20251001
  embeddings:
    code: local-advanced/nomic-embed-code-gguf
    text: local-advanced/qwen3-embedding-8b-gguf

# ---- flows -----------------------------------------------------------------
# Enable the deterministic, LLM-free `flows` phase (doc 23, Stage 1). It runs
# right after rag-index, walks the cross-file reference graph, and writes
# `.anatoly/state/internal-flows/flows.json`. The `flow` evaluation axis (doc 23
# section 7, enabled below) consumes that artifact to score parcours-level
# structural defects. The phase itself stays deterministic and LLM-free; the
# scored findings come from the `flow` axis pass over its output. Inspect
# flows.json directly to debug the walk (see BENCH_PROCEDURE.md).
flows:
  enabled: true

# ---- evaluation ------------------------------------------------------------
# Two scored axes: `utility` (dead exports + barrel false-positive guard) and
# `flow` (doc 23 section 7, the parcours-level structural-quality axis fed by
# flows.json). See SPEC.md scored_axes and catalog/task-vault/BENCH_PROCEDURE.md.
# The other axes are disabled so the run measures the dead-code/dead-intent and
# flow detectors without cross-axis noise and without paying for unused passes.
# `global_f1` is the bipartite-matched F1 across both scored axes; per_axis
# carries utility.f1 and flow.f1 separately.
#
# `flow: true` is forward-compatible: the v3 schema (EvaluationAxesSchema) does
# not yet enumerate `flow`, so a plain z.object strips the key today (utility-
# only scoring, the flow phase still emits flows.json). Once the product `flow`
# axis registers the key, this same config activates flow scoring with no edit.
evaluation:
  axes:
    utility: true
    flow: true
    duplication: false
    correction: false
    overengineering: false
    tests: false
    best_practices: false
    # documentation disabled: this fixture ships no JSDoc and no
    # code-vs-doc contradiction defect, so the documentation axis is not in
    # scored_axes and running it only wastes review time/cost. The v3 schema
    # still requires the reference/internal blocks even when enabled:false.
    documentation:
      enabled: false
      reference:
        paths:
          - README.md
        inline_comments:
          enabled: false
      internal:
        mode: "off"
