# Anatoly configuration — generated by first-run wizard. Edit freely.
# Optional sections are commented out below — uncomment what you need.

version: 3

# ---- project ---------------------------------------------------------------
project:
  name: my-project

# ---- scan ------------------------------------------------------------------
# Detected from your manifests (package.json, tsconfig.json, Cargo.toml, …)
# and language distribution. Edit freely — these are the strict, authoritative
# globs `collectFiles` consumes.
#
# respect_gitignore (default true): files ignored by .gitignore are filtered
# out by intersecting with `git ls-files`. Set to false to audit gitignored
# files explicitly.
scan:
  include:
    - src/**/*.{ts,tsx}
  exclude:
    - .anatoly/**
    - .git/**
    - .next/**
    - build/**
    - coverage/**
    - dist/**
    - node_modules/**
  respect_gitignore: true

# ---- coverage (optional — defaults shown) ----------------------------------
# coverage:
#   enabled: true
#   command: npx vitest run --coverage.reporter=json
#   report_path: coverage/coverage-final.json

# ---- providers -------------------------------------------------------------
providers:
  anthropic:
    transport: claude_agent_sdk
    auth: oauth
    concurrency: 24
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - claude-opus-4-6
  local-advanced:
    transport: openai_compatible
    auth: none
    models:
      - nomic-embed-code-gguf
      - qwen3-embedding-8b-gguf
  #
  # ONNX embeddings, in-process. No API key needed.
  # local-lite:
  #   transport: onnxruntime_node
  #   models:
  #     - jinaai/jina-embeddings-v2-base-code
  #     - Xenova/all-MiniLM-L6-v2
  #
  # External embeddings (mistral-embed). Requires MISTRAL_API_KEY.
  # mistral:
  #   transport: openai_compatible
  #   auth: api_key
  #   env_key: MISTRAL_API_KEY
  #   models:
  #     - mistral-embed
  #
  # External embeddings/LLM gateway. Requires OPENROUTER_API_KEY.
  # openrouter:
  #   transport: openai_compatible
  #   auth: api_key
  #   env_key: OPENROUTER_API_KEY
  #   models:
  #     - qwen/qwen3-embedding-8b
  #
  # Gemini API for single-turn axes. Requires GEMINI_API_KEY.
  # google:
  #   transport: google_genai
  #   auth: api_key
  #   env_key: GEMINI_API_KEY
  #   concurrency: 10
  #   models:
  #     - gemini-2.5-pro
  #     - gemini-2.5-flash-lite

# ---- routing ---------------------------------------------------------------
routing:
  generation:
    quality: anthropic/claude-sonnet-4-6
    fast: anthropic/claude-haiku-4-5-20251001
    deliberation: anthropic/claude-opus-4-6
    summarization: anthropic/claude-haiku-4-5-20251001
  embeddings:
    code: local-advanced/nomic-embed-code-gguf
    text: local-advanced/qwen3-embedding-8b-gguf

# ---- evaluation ------------------------------------------------------------
evaluation:
  axes:
    utility: true
    duplication: true
    correction: true
    overengineering: true
    # tests + documentation excluded: the fixture ships no test suite and no
    # JSDoc, so they are not in scored_axes (SPEC.md) and running them only
    # wastes review time/cost. The invariants phase reads source comments
    # directly, so disabling the documentation axis does not affect it.
    tests: false
    best_practices: true
    # documentation disabled (no JSDoc in fixture, not scored). The v3 schema
    # still requires reference/internal blocks even when enabled:false.
    documentation:
      enabled: false
      reference:
        paths:
          - README.md
        inline_comments:
          enabled: false
      internal:
        mode: "off"
# Per-axis override example — replaces routing.generation.quality for that axis:
#   correction:
#     enabled: true
#     model: anthropic/claude-opus-4-6
# Documentation extras (docs_path / module_mapping):
#   documentation:
#     enabled: true
#     model: anthropic/claude-sonnet-4-6
#     docs_path: docs
#     module_mapping:
#       'docs/api/auth.md':
#         - 'src/auth/**/*.ts'

