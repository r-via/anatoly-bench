# Anatoly configuration — generated by first-run wizard. Edit freely.
# Optional sections are commented out below — uncomment what you need.

version: 3

# ---- project ---------------------------------------------------------------
project:
  name: train-dispatch

# ---- scan ------------------------------------------------------------------
# Detected from your manifests (package.json, tsconfig.json, Cargo.toml, …)
# and language distribution. Edit freely — these are the strict, authoritative
# globs `collectFiles` consumes.
#
# respect_gitignore (default true): files ignored by .gitignore are filtered
# out by intersecting with `git ls-files`. Set to false to audit gitignored
# files explicitly.
scan:
  include:
    - src/**/*.{ts,tsx}
  exclude:
    - .anatoly/**
    - .git/**
    - .next/**
    - build/**
    - coverage/**
    - dist/**
    - node_modules/**
  respect_gitignore: true

# ---- providers -------------------------------------------------------------
providers:
  anthropic:
    transport: claude_agent_sdk
    auth: oauth
    concurrency: 24
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - claude-opus-4-6
  local-advanced:
    transport: openai_compatible
    auth: none
    models:
      - nomic-embed-code-gguf
      - qwen3-embedding-8b-gguf

# ---- routing ---------------------------------------------------------------
routing:
  generation:
    quality: anthropic/claude-sonnet-4-6
    fast: anthropic/claude-haiku-4-5-20251001
    deliberation: anthropic/claude-opus-4-6
    summarization: anthropic/claude-haiku-4-5-20251001
  embeddings:
    code: local-advanced/nomic-embed-code-gguf
    text: local-advanced/qwen3-embedding-8b-gguf

# ---- evaluation ------------------------------------------------------------
# Single-axis fixture: only `correction` is scored (see SPEC.md scored_axes and
# catalog/train-dispatch/BENCH_PROCEDURE.md). The other six axes are disabled so
# the run measures the behavioural-invariant detector without cross-axis noise
# and without paying for unused axis passes.
evaluation:
  axes:
    utility: false
    duplication: false
    correction: true
    overengineering: false
    tests: false
    best_practices: false
    # Story 54.1: the documentation axis cannot use the boolean short form; it
    # requires the full object with reference + internal blocks even when
    # disabled. enabled:false keeps it out of the run.
    #
    # v2 experiment (baseline 2026-06-15_train-dispatch-v2) confirmed enabling
    # this axis does NOT surface INV-DWELL as a value contradiction: the axis is
    # a JSDoc-presence checker (flags DWELL_TICKS as UNDOCUMENTED, never compares
    # 6 vs README's "2 ticks"), and the cross-axis noise dropped correction F1
    # from 72.7% to 50.0% (lost INV-HEADWAY TP, gained 3 timetable FPs). Kept
    # disabled: this is a single-axis correction fixture.
    documentation:
      enabled: false
      reference:
        paths:
          - README.md
        inline_comments:
          enabled: false
      internal:
        mode: "off"
